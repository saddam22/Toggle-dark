<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Style Dark/Light Toggle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class'
  }
</script>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-500 flex items-center justify-center h-screen">

<div class="flex items-center gap-4">

<!-- Sun Icon -->
<span class="text-yellow-400 text-2xl">☀️</span>

<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
  <input type="checkbox" id="themeToggle" class="sr-only">
  <div class="w-14 h-7 bg-gray-300 rounded-full peer dark:bg-gray-700 transition-colors"></div>
  <div class="absolute left-1 top-1 w-5 h-5 bg-white rounded-full transition-transform peer-checked:translate-x-7"></div>
</label>

<!-- Moon Icon -->
<span class="text-gray-200 text-2xl">🌙</span>

</div>

<script src="script.js"></script>

</body>
</html>
